<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin | Nexora</title>
    <meta name="description" content="Painel administrativo Nexora." />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-mark">N</span><span>NEXORA</span></a>
      <nav class="main-nav" aria-label="Navegacao principal">
        <a href="index.html">Loja</a>
        <a href="carrinho.html">Carrinho <span class="cart-count">0</span></a>
      </nav>
      <div class="header-actions">
        <button class="icon-button theme-toggle" type="button" aria-label="Alternar tema" title="Alternar tema"></button>
      </div>
    </header>

    <main class="page-shell">
      <section class="admin-shell">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Painel</p>
            <h1>Administracao Nexora</h1>
          </div>
          <button class="button ghost" id="resetDemoData" type="button">Restaurar demo</button>
        </div>

        <div class="admin-grid">
          <section class="admin-panel">
            <h2>Produtos</h2>
            <form id="productForm" class="stack-form">
              <input type="hidden" name="id" />
              <label>Nome<input name="name" required /></label>
              <label>Preco<input name="price" type="number" min="0" step="0.01" required /></label>
              <label>Imagem URL<input name="image" required /></label>
              <label>Descricao<textarea name="description" rows="3" required></textarea></label>
              <label>Link do fornecedor<input name="supplier" placeholder="https://..." /></label>
              <label>Categoria<input name="category" placeholder="Audio, Smart Home..." /></label>
              <div class="form-actions">
                <button class="button primary" type="submit">Salvar produto</button>
                <button class="button ghost" id="clearProductForm" type="button">Limpar</button>
              </div>
            </form>
            <div class="admin-list" id="adminProductList"></div>
          </section>

          <section class="admin-panel">
            <h2>SEO e Open Graph</h2>
            <form id="seoForm" class="stack-form">
              <label>Titulo do site<input name="title" required /></label>
              <label>Descricao<textarea name="description" rows="3" required></textarea></label>
              <label>Palavras-chave<input name="keywords" /></label>
              <label>OG titulo<input name="ogTitle" /></label>
              <label>OG descricao<textarea name="ogDescription" rows="2"></textarea></label>
              <label>OG imagem URL<input name="ogImage" /></label>
              <label>Mercado Pago checkout link<input name="mercadoPagoLink" placeholder="https://www.mercadopago.com.br/checkout/..." /></label>
              <label>Endpoint API Mercado Pago<input name="mercadoPagoApi" placeholder="https://seu-servidor.com/api/create-preference" /></label>
              <button class="button primary" type="submit">Salvar SEO</button>
            </form>
          </section>

          <section class="admin-panel">
            <h2>Redes sociais</h2>
            <form id="socialForm" class="stack-form">
              <label>Instagram<input name="instagram" placeholder="https://instagram.com/nexora" /></label>
              <label>TikTok<input name="tiktok" placeholder="https://tiktok.com/@nexora" /></label>
              <label>YouTube<input name="youtube" placeholder="https://youtube.com/@nexora" /></label>
              <label>WhatsApp<input name="whatsapp" placeholder="https://wa.me/5511999999999" /></label>
              <label>Link personalizado<input name="custom" placeholder="https://..." /></label>
              <button class="button primary" type="submit">Salvar redes</button>
            </form>
          </section>

          <section class="admin-panel">
            <h2>Campanhas</h2>
            <form id="campaignForm" class="stack-form">
              <input type="hidden" name="id" />
              <label>Titulo<input name="title" required /></label>
              <label>Texto<textarea name="text" rows="3" required></textarea></label>
              <label>Link do video/conteudo<input name="url" placeholder="https://..." /></label>
              <label>Produto destacado<select name="productId" id="campaignProductSelect"></select></label>
              <div class="form-actions">
                <button class="button primary" type="submit">Salvar campanha</button>
                <button class="button ghost" id="clearCampaignForm" type="button">Limpar</button>
              </div>
            </form>
            <div class="admin-list" id="adminCampaignList"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
